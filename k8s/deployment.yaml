apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-worker
  labels:
    app: multi-agent-worker
spec:
  replicas: 1 # Can be scaled as needed
  selector:
    matchLabels:
      app: multi-agent-worker
  template:
    metadata:
      labels:
        app: multi-agent-worker
    spec:
      containers:
      - name: worker
        image: multi-agent-worker:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: api-key
        volumeMounts:
        # Warning: Mounting docker.sock in k8s has security implications.
        # In a real production cluster, consider alternatives like DinD or Kata containers for the sandbox.
        - mountPath: /var/run/docker.sock
          name: docker-sock
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
